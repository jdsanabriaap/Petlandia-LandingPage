name: Deploy Landing to OCI

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to OCI Object Storage
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        env:
          OCI_CLI_USER:        ${{ secrets.OCI_USER_OCID }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_CLI_TENANCY:     ${{ secrets.OCI_TENANCY_OCID }}
          OCI_CLI_REGION:      ${{ secrets.OCI_REGION }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_KEY_FILE }}
        with:
          command: >
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse
            --src-dir ./
            --exclude ".git/*"
            --exclude ".github/*"
            --exclude "README.md"
            --content-type auto
            --overwrite

      # Requiere en GitHub → Settings → Secrets:
      # CLOUDFLARE_ZONE_ID  → Zone ID del dominio en Cloudflare
      # CLOUDFLARE_API_TOKEN → API Token con permiso "Cache Purge" (o Zone:Cache Purge)
      - name: Purge Cloudflare cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          if [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Faltan secrets CLOUDFLARE_ZONE_ID o CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          HTTP_CODE=$(curl -sS -o cf-purge.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          cat cf-purge.json
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Cloudflare purge falló (HTTP $HTTP_CODE)"
            exit 1
          fi
          grep -q '"success":true' cf-purge.json || { echo "::error::Respuesta Cloudflare sin success"; exit 1; }