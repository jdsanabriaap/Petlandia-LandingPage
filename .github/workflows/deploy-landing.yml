name: Deploy Landing to OCI

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to OCI Object Storage (por tipo con content-type correcto)
        uses: oracle-actions/run-oci-cli-command@v1.3.2
        env:
          OCI_CLI_USER:        ${{ secrets.OCI_USER_OCID }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_CLI_TENANCY:     ${{ secrets.OCI_TENANCY_OCID }}
          OCI_CLI_REGION:      ${{ secrets.OCI_REGION }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_KEY_FILE }}
        with:
          command: |
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.html" --content-type "text/html" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.css" --content-type "text/css" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.js" --content-type "application/javascript" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.png" --content-type "image/png" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.jpg" --content-type "image/jpeg" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.jpeg" --content-type "image/jpeg" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.webp" --content-type "image/webp" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.svg" --content-type "image/svg+xml" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.mp4" --content-type "video/mp4" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.ico" --content-type "image/x-icon" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.woff2" --content-type "font/woff2" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.woff" --content-type "font/woff" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.ttf" --content-type "font/ttf" --overwrite &&
            os object bulk-upload -ns axnplbo9mhwv -bn petlandia-clubhouse --src-dir ./ --exclude ".git/*" --exclude ".github/*" --exclude "README.md" --include "*.json" --content-type "application/json" --overwrite